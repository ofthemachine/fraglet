name: Build fraglet-entrypoint (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (optional, for release builds)'
        required: false
        type: string

jobs:
  build:
    name: 🛠 Build fraglet-entrypoint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: 'entrypoint/go.mod'

      - name: Run tests
        working-directory: entrypoint
        run: |
          go test ./...

      - name: Generate build info
        working-directory: entrypoint
        run: |
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(git show -s --format=%cI HEAD)

          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            VERSION="dev+sha.${SHORT_SHA}"
          fi

          printf '{\n  "version": "%s",\n  "commit": "%s",\n  "buildTime": "%s",\n  "dirty": %s\n}\n' \
            "$VERSION" "$COMMIT" "$BUILD_TIME" "false" > cmd/build-info.json
          echo "Embedded build info:"
          cat cmd/build-info.json

      - name: Build multi-arch binaries
        working-directory: entrypoint
        run: |
          set -e
          for platform in "linux/amd64" "linux/arm64"; do
            GOOS=$(echo "$platform" | cut -d'/' -f1)
            GOARCH=$(echo "$platform" | cut -d'/' -f2)
            PLATFORM_NAME="${GOOS}-${GOARCH}"

            echo "Building ${PLATFORM_NAME}..."

            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -trimpath -buildvcs=false -ldflags="-s -w" \
              -o "fraglet-entrypoint-${PLATFORM_NAME}" ./cmd

            sha256sum "fraglet-entrypoint-${PLATFORM_NAME}" > "fraglet-entrypoint-${PLATFORM_NAME}.sha256"
          done

          sha256sum fraglet-entrypoint-* | grep -v "\.sha256" > checksums.txt

      - name: Save build-info.json for reproducibility
        run: cp entrypoint/cmd/build-info.json entrypoint/build-info.json

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fraglet-entrypoint-binaries
          path: |
            entrypoint/fraglet-entrypoint-*
            entrypoint/checksums.txt
            entrypoint/build-info.json
          retention-days: 1

