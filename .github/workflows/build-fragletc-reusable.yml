name: Build fragletc (reusable)

on:
  workflow_call:

jobs:
  build:
    name: 🛠 Build fragletc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version-file: 'go.mod'

      - name: Generate build info
        run: |
          make build-info
          echo "Embedded build info:"
          cat cli/build-info.json

      - name: Run tests
        run: go test ./...

      - name: Build multi-arch binaries (Linux + Windows + macOS)
        run: |
          set -e
          for platform in "linux/amd64" "linux/arm64" "windows/amd64" "darwin/amd64" "darwin/arm64"; do
            GOOS=$(echo "$platform" | cut -d'/' -f1)
            GOARCH=$(echo "$platform" | cut -d'/' -f2)
            PLATFORM_NAME="${GOOS}-${GOARCH}"
            OUT="fragletc-${PLATFORM_NAME}"
            [ "$GOOS" = "windows" ] && OUT="${OUT}.exe"

            echo "Building ${PLATFORM_NAME}..."
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -trimpath -buildvcs=false -ldflags="-s -w" \
              -o "${OUT}" ./cli

            sha256sum "${OUT}" > "${OUT}.sha256"
          done

          sha256sum fragletc-* | grep -v "\.sha256" > checksums.txt

      - name: Save build-info.json for reproducibility
        run: cp cli/build-info.json build-info.json

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fragletc-binaries
          path: |
            fragletc-*
            checksums.txt
            build-info.json
          retention-days: 1
